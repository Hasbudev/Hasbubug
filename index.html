<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Parc des Insectes — Tirage Pokémon</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- ── Décor Gen 2 ── -->
  <div class="scene-sky"></div>
  <canvas id="stars-canvas"></canvas>
  <div class="scene-moon"></div>
  <div class="scene-trees-far"></div>
  <div class="scene-trees-mid"></div>
  <div class="scene-fog"></div>
  <div class="scene-ground"></div>
  <div class="scene-grass"></div>
  <canvas id="firefly-canvas"></canvas>

  <!-- ── App ── -->
  <div class="app">
    <header class="header">
      <div class="hero">
        <h1 class="title">Parc des Insectes</h1>
        <p class="subtitle">Réponds aux questions, avance de zone, puis tente ton tirage.</p>
        <img src="./Logo_RPPLF.png" alt="RPPLF League" class="main-logo" />
      </div>
      <div id="status" class="week-pill">Semaine 1</div>
    </header>

    <main id="screen" class="card"></main>

    <footer class="footer muted">
      <span>hasbii</span>
      <span>•</span>
      <span>on da beat</span>
    </footer>
  </div>

  <!-- ── Scène animée ── -->
  <script>
  (function() {

    /* ── ÉTOILES ── */
    const starsCanvas = document.getElementById("stars-canvas");
    const sCtx = starsCanvas.getContext("2d");

    function resizeStars() {
      starsCanvas.width  = window.innerWidth;
      starsCanvas.height = window.innerHeight;
    }
    resizeStars();
    window.addEventListener("resize", resizeStars);

    // Génère des étoiles fixes
    const STAR_COUNT = 160;
    const stars = Array.from({ length: STAR_COUNT }, () => ({
      x: Math.random(),
      y: Math.random() * 0.65,        // seulement dans la moitié haute
      r: Math.random() * 1.4 + 0.3,
      baseAlpha: Math.random() * 0.6 + 0.2,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinklePhase: Math.random() * Math.PI * 2,
    }));

    function drawStars(t) {
      const W = starsCanvas.width;
      const H = starsCanvas.height;
      sCtx.clearRect(0, 0, W, H);

      for (const s of stars) {
        const alpha = s.baseAlpha + Math.sin(t * s.twinkleSpeed + s.twinklePhase) * 0.25;
        sCtx.beginPath();
        sCtx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        // Couleur légèrement verte pour coller à la palette
        sCtx.fillStyle = `rgba(200, 255, 210, ${Math.max(0, alpha)})`;
        sCtx.fill();
      }
    }

    /* ── LUCIOLES ── */
    const ffCanvas = document.getElementById("firefly-canvas");
    const fCtx = ffCanvas.getContext("2d");

    function resizeFireflies() {
      ffCanvas.width  = window.innerWidth;
      ffCanvas.height = window.innerHeight;
    }
    resizeFireflies();
    window.addEventListener("resize", resizeFireflies);

    const FIREFLY_COUNT = 28;
    const fireflies = Array.from({ length: FIREFLY_COUNT }, () => makeFirefly());

    function makeFirefly() {
      const W = window.innerWidth;
      const H = window.innerHeight;
      return {
        x: Math.random() * W,
        y: H * 0.4 + Math.random() * H * 0.45,   // zone basse/forêt
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.3,
        r:  Math.random() * 2 + 1,
        // Phase de clignotement
        blinkSpeed: Math.random() * 0.03 + 0.01,
        blinkPhase: Math.random() * Math.PI * 2,
        // Couleur : vert jaune typique luciole Johto
        hue: 70 + Math.random() * 40,
        // Amplitude de dérive sinusoïdale
        driftAmp: Math.random() * 0.8 + 0.3,
        driftFreq: Math.random() * 0.015 + 0.005,
        driftPhase: Math.random() * Math.PI * 2,
        life: 1,
      };
    }

    function updateFireflies(t) {
      const W = ffCanvas.width;
      const H = ffCanvas.height;

      for (let i = 0; i < fireflies.length; i++) {
        const f = fireflies[i];
        f.x += f.vx + Math.sin(t * f.driftFreq + f.driftPhase) * f.driftAmp * 0.1;
        f.y += f.vy + Math.cos(t * f.driftFreq * 0.7 + f.driftPhase) * f.driftAmp * 0.08;

        // Reboucle doucement
        if (f.x < -20 || f.x > W + 20 || f.y < H * 0.25 || f.y > H + 10) {
          fireflies[i] = makeFirefly();
          fireflies[i].x = Math.random() * W;
        }
      }
    }

    function drawFireflies(t) {
      const W = ffCanvas.width;
      const H = ffCanvas.height;
      fCtx.clearRect(0, 0, W, H);

      for (const f of fireflies) {
        const alpha = (Math.sin(t * f.blinkSpeed + f.blinkPhase) + 1) / 2;
        const glow  = alpha * 0.85 + 0.1;

        // Halo externe
        const grad = fCtx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r * 7);
        grad.addColorStop(0,   `hsla(${f.hue}, 100%, 80%, ${glow * 0.55})`);
        grad.addColorStop(0.4, `hsla(${f.hue}, 90%, 60%, ${glow * 0.2})`);
        grad.addColorStop(1,   `hsla(${f.hue}, 80%, 50%, 0)`);
        fCtx.beginPath();
        fCtx.arc(f.x, f.y, f.r * 7, 0, Math.PI * 2);
        fCtx.fillStyle = grad;
        fCtx.fill();

        // Point central
        fCtx.beginPath();
        fCtx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        fCtx.fillStyle = `hsla(${f.hue}, 100%, 95%, ${glow})`;
        fCtx.fill();
      }
    }

    /* ── BOUCLE PRINCIPALE ── */
    let t = 0;
    function loop() {
      t++;
      drawStars(t);
      updateFireflies(t);
      drawFireflies(t);
      requestAnimationFrame(loop);
    }
    loop();

  })();
  </script>

  <!-- Firebase SDK (modular) -->
  <script type="module" src="./app.js"></script>
</body>
</html>
