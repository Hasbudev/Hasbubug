<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Parc des Insectes — Tirage Pokémon</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- ── Décor Parc Safari Johto ── -->
  <div class="scene-sky"></div>
  <div class="scene-sun"></div>
  <div class="scene-haze"></div>
  <div class="scene-trees-far"></div>
  <div class="scene-trees-mid"></div>
  <div class="scene-ground"></div>
  <div class="scene-tall-grass"></div>
  <div class="scene-path"></div>
  <canvas id="bug-canvas"></canvas>

  <!-- ── App ── -->
  <div class="app">
    <header class="header">
      <div class="hero">
        <h1 class="title">Parc des Insectes</h1>
        <p class="subtitle">Réponds aux questions, avance de zone, puis tente ton tirage.</p>
        <img src="./Logo_RPPLF.png" alt="RPPLF League" class="main-logo" />
      </div>
      <div id="status" class="week-pill">Semaine 1</div>
    </header>

    <main id="screen" class="card"></main>

    <footer class="footer muted">
      <span>hasbii</span>
      <span>•</span>
      <span>on da beat</span>
    </footer>
  </div>

  <script>
  (function () {
    const canvas = document.getElementById("bug-canvas");
    const ctx    = canvas.getContext("2d");

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    const W = () => canvas.width;
    const H = () => canvas.height;

    /* ══════════════════════════════════════
       LUCIOLES — point lumineux jaune-vert
    ══════════════════════════════════════ */
    const FIREFLY_N = 32;
    const fireflies = Array.from({ length: FIREFLY_N }, () => spawnFirefly(true));

    function spawnFirefly(anywhere) {
      const h = H();
      return {
        x: Math.random() * W(),
        y: anywhere
          ? h * 0.3 + Math.random() * h * 0.55
          : h * 0.35 + Math.random() * h * 0.5,
        vx: (Math.random() - 0.5) * 0.45,
        vy: (Math.random() - 0.5) * 0.3,
        r:  1.2 + Math.random() * 1.6,
        hue: 72 + Math.random() * 28,         // vert-jaune
        blink: Math.random() * Math.PI * 2,
        blinkSpd: 0.018 + Math.random() * 0.022,
        driftPhase: Math.random() * Math.PI * 2,
        driftAmp: 0.6 + Math.random() * 1.2,
        driftFreq: 0.006 + Math.random() * 0.012,
      };
    }

    function drawFireflies(t) {
      for (const f of fireflies) {
        f.x += f.vx + Math.sin(t * f.driftFreq + f.driftPhase) * f.driftAmp * 0.08;
        f.y += f.vy + Math.cos(t * f.driftFreq * 0.7 + f.driftPhase) * f.driftAmp * 0.06;

        // Recycle si sorti
        if (f.x < -15 || f.x > W() + 15 || f.y < H() * 0.2 || f.y > H() + 10) {
          Object.assign(f, spawnFirefly(false));
          f.x = Math.random() * W();
        }

        const alpha = (Math.sin(t * f.blinkSpd + f.blink) + 1) / 2;
        const glow  = alpha * 0.9 + 0.08;

        const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r * 7);
        g.addColorStop(0,   `hsla(${f.hue},100%,80%,${glow * 0.55})`);
        g.addColorStop(0.4, `hsla(${f.hue},90%,60%,${glow * 0.2})`);
        g.addColorStop(1,   `hsla(${f.hue},80%,50%,0)`);
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r * 7, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${f.hue},100%,96%,${glow})`;
        ctx.fill();
      }
    }

    /* ══════════════════════════════════════
       PAPILLONS / INSECTES volants
       Silhouette minimaliste 2 ailes
    ══════════════════════════════════════ */
    const BUG_N = 10;
    const bugs  = Array.from({ length: BUG_N }, () => spawnBug(true));

    function spawnBug(anywhere) {
      const h = H();
      const types = ["butterfly", "moth", "beetle"];
      return {
        type: types[Math.floor(Math.random() * types.length)],
        x: anywhere ? Math.random() * W() : -40,
        y: anywhere
          ? h * 0.15 + Math.random() * h * 0.55
          : h * 0.15 + Math.random() * h * 0.5,
        vx: 0.3 + Math.random() * 0.7,
        vy: (Math.random() - 0.5) * 0.25,
        scale: 0.55 + Math.random() * 0.55,
        wingPhase: Math.random() * Math.PI * 2,
        wingSpd: 0.12 + Math.random() * 0.14,
        bobPhase: Math.random() * Math.PI * 2,
        bobAmp: 0.5 + Math.random() * 1.0,
        bobFreq: 0.015 + Math.random() * 0.015,
        alpha: 0.5 + Math.random() * 0.35,
        // couleur selon type
        color: {
          butterfly: `hsla(${38 + Math.random()*30},80%,60%,`,   // ambre/or
          moth:      `hsla(${100 + Math.random()*30},45%,50%,`,  // vert pâle
          beetle:    `hsla(${130 + Math.random()*20},50%,30%,`,  // vert sombre
        },
      };
    }

    function drawBug(b, t) {
      ctx.save();
      ctx.translate(b.x, b.y + Math.sin(t * b.bobFreq + b.bobPhase) * b.bobAmp);
      ctx.scale(b.scale, b.scale);

      const col = b.color[b.type];
      const wingOpen = Math.abs(Math.sin(t * b.wingSpd + b.wingPhase));

      if (b.type === "butterfly" || b.type === "moth") {
        // Aile gauche
        ctx.beginPath();
        ctx.ellipse(-7 * wingOpen, -4, 9, 5, -0.4, 0, Math.PI * 2);
        ctx.fillStyle = col + b.alpha + ")";
        ctx.fill();
        ctx.strokeStyle = col + (b.alpha * 0.5) + ")";
        ctx.lineWidth = 0.5;
        ctx.stroke();
        // Aile droite
        ctx.beginPath();
        ctx.ellipse(7 * wingOpen, -4, 9, 5, 0.4, 0, Math.PI * 2);
        ctx.fillStyle = col + b.alpha + ")";
        ctx.fill();
        ctx.stroke();
        // Corps
        ctx.beginPath();
        ctx.ellipse(0, 0, 1.5, 5, 0, 0, Math.PI * 2);
        ctx.fillStyle = col + (b.alpha * 1.2) + ")";
        ctx.fill();
      } else {
        // Coléoptère — forme plus ronde
        ctx.beginPath();
        ctx.ellipse(-5 * wingOpen * 0.6, 0, 7, 4, -0.3, 0, Math.PI * 2);
        ctx.fillStyle = col + b.alpha + ")";
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(5 * wingOpen * 0.6, 0, 7, 4, 0.3, 0, Math.PI * 2);
        ctx.fillStyle = col + b.alpha + ")";
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(0, 0, 3, 5, 0, 0, Math.PI * 2);
        ctx.fillStyle = col + (b.alpha + 0.1) + ")";
        ctx.fill();
      }

      ctx.restore();
    }

    function drawBugs(t) {
      for (const b of bugs) {
        b.x += b.vx;
        b.y += b.vy;
        if (b.x > W() + 50) Object.assign(b, spawnBug(false));
        drawBug(b, t);
      }
    }

    /* ══════════════════════════════════════
       SPORES / PARTICULES végétales
    ══════════════════════════════════════ */
    const SPORE_N = 40;
    const spores  = Array.from({ length: SPORE_N }, () => spawnSpore(true));

    function spawnSpore(anywhere) {
      const h = H();
      return {
        x: Math.random() * W(),
        y: anywhere ? Math.random() * h : h + 5,
        vx: (Math.random() - 0.3) * 0.35,
        vy: -(0.15 + Math.random() * 0.35),    // monte doucement
        r: 0.8 + Math.random() * 1.4,
        alpha: 0.15 + Math.random() * 0.25,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpd: 0.012 + Math.random() * 0.012,
      };
    }

    function drawSpores(t) {
      for (const s of spores) {
        s.wobble += s.wobbleSpd;
        s.x += s.vx + Math.sin(s.wobble) * 0.4;
        s.y += s.vy;
        if (s.y < -10) Object.assign(s, spawnSpore(false));

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180,220,130,${s.alpha})`;
        ctx.fill();
      }
    }

    /* ══════════════════════════════════════
       BOUCLE
    ══════════════════════════════════════ */
    let t = 0;
    function loop() {
      t++;
      ctx.clearRect(0, 0, W(), H());
      drawSpores(t);
      drawBugs(t);
      drawFireflies(t);
      requestAnimationFrame(loop);
    }
    loop();

  })();
  </script>

  <script type="module" src="./app.js"></script>
</body>
</html>
